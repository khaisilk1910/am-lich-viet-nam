type: custom:html-template-card
title: ⏰ Sự kiện sắp đến
ignore_line_breaks: true
content: |
  <div class="scroll-area">
    <table border="0" cellpadding="2" cellspacing="4" width="100%" style="margin-top: -10px;">
      {%- set ns = namespace(events=[]) -%}
      {%- set so_ngay = 30 -%}
      
      {%- set attr_labels = {
        'ngay_am_lich_su_kien': 'Ngày Âm Lịch',
        'ngay_duong_lich_su_kien': 'Ngày Dương Lịch',
        'thu_su_kien': 'Thứ',
        'nam_can_chi_su_kien': 'Năm Can Chi',
        'so_nam': 'Số Năm kỷ niệm',
        'so_tuoi': 'Số Tuổi',
        'chi_tiet': 'Chi Tiết'
      } -%}

      {%- for state in states.sensor | selectattr('attributes.ngay_am_lich_su_kien', 'defined') | selectattr('attributes.ngay_duong_lich_hien_tai', 'defined') -%}
        {%- if 0 <= state.state | int(-1) <= so_ngay -%}
          {%- set am_split = state.attributes.ngay_am_lich_su_kien.split('/') -%}
          {%- set am_short = am_split[0] ~ '/' ~ am_split[1] if am_split | length >= 2 else state.attributes.ngay_am_lich_su_kien -%}
          {%- set ns.events = ns.events + [{
            'entity_id': state.entity_id,
            'thu': state.attributes.thu_hien_tai, 
            'duong': state.attributes.ngay_duong_lich_hien_tai[:5], 
            'name': state.attributes.friendly_name | default(state.name),
            'am': am_short, 
            'days': state.state | int
          }] -%}
        {%- endif -%}
      {%- endfor -%}

      {%- for state in states.sensor | selectattr('attributes.ngay_duong_lich_su_kien', 'defined') | selectattr('attributes.ngay_am_lich_hien_tai', 'defined') -%}
        {%- if 0 <= state.state | int(-1) <= so_ngay -%}
          {%- set am_split = state.attributes.ngay_am_lich_hien_tai.split('/') -%}
          {%- set am_short = am_split[0] ~ '/' ~ am_split[1] if am_split | length >= 2 else state.attributes.ngay_am_lich_hien_tai -%}
          {%- set ns.events = ns.events + [{
            'entity_id': state.entity_id,
            'thu': state.attributes.thu_hien_tai, 
            'duong': state.attributes.ngay_duong_lich_su_kien[:5], 
            'name': state.attributes.friendly_name | default(state.name),
            'am': am_short, 
            'days': state.state | int
          }] -%}
        {%- endif -%}
      {%- endfor -%}
      
      {%- if ns.events | count > 0 -%}
        {%- for ev in ns.events | sort(attribute='days') -%}
            
        {%- set mau_td = "blue" -%}
        {%- if ev.days <= 2 -%}
          {%- set mau_td = "red" -%}
        {%- elif ev.days <= 7 -%}
          {%- set mau_td = "orange" -%}
        {%- elif 7 < ev.days <= 15  -%}
          {%- set mau_td = "yellow" -%}
        {%- endif -%}

        {%- set ten_su_kien = ev.name | lower -%}
        {%- set icon = "📌" -%} 
        {%- if "sinh nhật" in ten_su_kien -%}
          {%- set icon = "🥳🎂" -%}
        {%- elif "giỗ" in ten_su_kien -%}
          {%- set icon = "🕯️" -%}
        {%- elif "cưới" in ten_su_kien -%}
          {%- set icon = "🎉💍" -%}
        {%- endif -%}
        
        <tr class="event-row" onclick="const d = this.nextElementSibling; const i = this.querySelector('.toggle-icon'); if(d.style.display==='none' || d.style.display===''){ d.style.display='table-row'; i.style.transform='rotate(180deg)'; } else { d.style.display='none'; i.style.transform='rotate(0deg)'; }">
          <td align="center" width="20%" style="border-bottom: solid 1px gray; vertical-align: middle;">
            <div style="color:orange; margin-bottom: -8px;">{{ ev.thu }}</div>
            <div style="color:white; font-size:25px; font-weight:bold;">{{ ev.duong }}</div>
            <div style="color:orange; margin-top: -8px;">{{ ev.am }}</div>
          </td>
          
          <td align="center" style="background:{{mau_td}}; width: 4px; border-radius: 2px; vertical-align: middle; margin-bottom: 5px; padding-bottom: 5px;"></td>
          
          <td align="center" width="80%" style="border-bottom: solid 1px gray;">
            <div style="color:white; text-align: left; padding-left: 4px; display: flex; align-items: center;">
              <span style="font-size: 2em; margin-right: 4px;">{{ icon }}</span>
              <span>{{ev.name}}</span>
            </div>
            <div style="color:orange; text-align: right; padding-right: 10px;">
              <span style="font-style: italic;">{{ ev.days }} ngày</span>
              <span class="flip-emoji" style="font-size:18px;">⏳</span>
              <span class="toggle-icon" style="font-size: 14px; color: #888; margin-left: 8px; display: inline-block; transition: transform 0.3s;">▼</span>
            </div>
          </td>
        </tr>

        {%- set state_obj = states[ev.entity_id] -%}
        <tr style="display: none;" class="detail-row">
          <td colspan="3" style="border-bottom: solid 1px gray; padding: 0 5px 10px 5px;">
            <div class="detail-content">
              {%- for key, label in attr_labels.items() -%}
                {%- if state_obj.attributes[key] is defined -%}
                  {%- set attr_val = state_obj.attributes[key] | string | trim -%}
                  {%- if attr_val | length > 0 and attr_val != 'Không rõ' and attr_val != '0' and attr_val != 'None' -%}
                    {%- if key == 'chi_tiet' -%}
                      <div class="attr-box">
                        <div class="attr-label">{{ label }}:</div>
                        <div class="attr-value-full">{{ attr_val }}</div>
                      </div>
                    {%- else -%}
                      <div class="attr-row">
                        <span class="attr-label">{{ label }}:</span>
                        <span class="attr-value">{{ attr_val }}</span>
                      </div>
                    {%- endif -%}
                  {%- endif -%}
                {%- endif -%}
              {%- endfor -%}
            </div>
          </td>
        </tr>
        {%- endfor -%}
      {%- else -%}
        <tr cellpadding="2" cellspacing="4">
          <td colspan="3" align="left">
            Không có sự kiện nào trong <span style="color:red; font-size:25px; font-weight:bold;">{{ so_ngay }}</span> ngày tới
          </td>
        </tr>
      {%- endif -%}
    </table>
  </div>

  <div class="conv-wrapper" style="margin-top: 10px;">
    
    <div class="conv-header" onclick="const b = this.nextElementSibling; const i = this.querySelector('.conv-icon'); if(b.style.display==='none' || b.style.display===''){b.style.display='block'; i.style.transform='rotate(180deg)';}else{b.style.display='none'; i.style.transform='rotate(0deg)';}">
      <h3 style="margin: 0; font-size: 1.1em; color: orange; display: flex; align-items: center; gap: 8px;">
        <span>🔄</span> Tra cứu / Quy đổi ngày nhanh
      </h3>
      <span class="conv-icon" style="transition: transform 0.3s; color: gray;">▼</span>
    </div>

    <div class="conv-body" style="display: none; margin-top: 15px;">
      <select class="conv-type conv-input" style="width: 100%; margin-bottom: 10px; text-align: left; padding-left: 10px;">
        <option value="solar_to_lunar">☀️ Dương lịch ➡️ 🌙 Âm lịch</option>
        <option value="lunar_to_solar">🌙 Âm lịch ➡️ ☀️ Dương lịch</option>
      </select>

      <div style="display: flex; gap: 8px; margin-bottom: 15px;">
        <input type="number" class="conv-day conv-input" placeholder="Ngày" min="1" max="31" style="flex: 1;">
        <input type="number" class="conv-month conv-input" placeholder="Tháng" min="1" max="12" style="flex: 1;">
        <input type="number" class="conv-year conv-input" placeholder="Năm" min="1800" max="2199" style="flex: 1.2;">
      </div>

      <button class="conv-btn" onclick="(async (btn) => { 
        const body = btn.parentElement; 
        const resDiv = body.querySelector('.conv-result'); 
        const type = body.querySelector('.conv-type').value; 
        const d = body.querySelector('.conv-day').value; 
        const m = body.querySelector('.conv-month').value; 
        const y = body.querySelector('.conv-year').value; 
        
        if(!d || !m || !y) { 
          resDiv.style.display = 'block'; 
          resDiv.innerHTML = '<span style=\'color:#ff6b6b;\'>⚠️ Vui lòng nhập đầy đủ Ngày, Tháng, Năm!</span>'; 
          return; 
        } 
        
        btn.innerText = '⏳ ĐANG TÍNH...'; 
        btn.style.opacity = '0.7'; 
        
        try { 
          const ha = document.querySelector('home-assistant'); 
          const response = await ha.hass.callWS({ 
            type: 'call_service', 
            domain: 'am_lich_viet_nam', 
            service: 'convert_date', 
            service_data: { conversion_type: type, day: parseInt(d), month: parseInt(m), year: parseInt(y) }, 
            return_response: true 
          }); 
          
          const data = response.response; 
          
          if(data.error) { 
            resDiv.innerHTML = '<span style=\'color:#ff6b6b;\'>❌ Lỗi: ' + data.error + '</span>'; 
          } else { 
            let html = '<div style=\'margin-bottom: 8px; color: white;\'>☀️ Ngày Dương Lịch: <b style=\'color:#4dabf7; font-size: 1.2em;\'>' + data.ngay_duong_lich + '</b></div>'; 
            html += '<div style=\'margin-bottom: 8px; color: white;\'>🌙 Ngày Âm Lịch: <b style=\'color:#ffd43b; font-size: 1.2em;\'>' + data.ngay_am_lich + '</b></div>'; 
            html += '<div style=\'margin-bottom: 8px; color: white;\'>🐲 Năm Can Chi: <b style=\'color:#ffffff; font-size: 1.2em;\'>' + data.nam_can_chi + '</b></div>'; 
            html += '<div style=\'margin-top: 10px; font-style: italic; color: #adb5bd; font-size: 0.9em; line-height: 1.4;\'>ℹ️ ' + data.thong_bao_nhuan + '</div>'; 
            
            if(data.ngay_duong_thang_thuong || data.ngay_duong_thang_nhuan) { 
              html += '<div style=\'margin-top: 10px; border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 10px;\'>'; 
              html += '<div style=\'color:orange; margin-bottom: 5px; font-size:0.9em;\'>📌 Chi tiết mốc ngày Dương lịch:</div>'; 
              if(data.ngay_duong_thang_thuong) html += '<div style=\'color: #adb5bd; font-size: 0.9em; margin-bottom: 4px;\'>🔹 Tính là tháng thường: <b style=\'color:white\'>' + data.ngay_duong_thang_thuong + '</b></div>'; 
              if(data.ngay_duong_thang_nhuan) html += '<div style=\'color: #adb5bd; font-size: 0.9em;\'>🔹 Tính là tháng nhuận: <b style=\'color:white\'>' + data.ngay_duong_thang_nhuan + '</b></div>'; 
              html += '</div>'; 
            }

            if(data.details) {
              let det = data.details;
              html += '<details class=\'lunar-details\' style=\'margin-top:15px;\'>';
              html += '<summary class=\'btn-detail\' title=\'Nhấn để xem hoặc ẩn\'>Chi tiết lịch âm</summary>';
              html += '<div class=\'details-content\'>';
              html += '<table class=\'info-table\' style=\'width:100%; border-collapse:collapse; margin-bottom:10px;\'>';
              html += '<tr><td style=\'padding:4px 0; width:30%; color:#aaa;\'>Âm lịch:</td><td style=\'color:white;\'>' + det.lunar_day + ' ' + det.month_name + ' ' + det.can_chi_year + '</td></tr>';
              html += '<tr><td style=\'padding:4px 0; color:#aaa;\'>Ngày:</td><td style=\'color:white;\'>' + det.can_chi_day + '</td></tr>';
              html += '<tr><td style=\'padding:4px 0; color:#aaa;\'>Tháng:</td><td style=\'color:white;\'>' + det.can_chi_month + '</td></tr>';
              html += '<tr><td style=\'padding:4px 0; color:#aaa;\'>Năm:</td><td style=\'color:white;\'>' + det.can_chi_year + '</td></tr>';
              html += '<tr><td style=\'padding:4px 0; color:#aaa;\'>Tiết khí:</td><td style=\'color:white;\'>' + det.tiet_khi + '</td></tr>';
              html += '</table>';
              
              html += '<div style=\'margin-top:10px;\'><div style=\'color:orange; font-weight:bold; margin-bottom:5px;\'>✨ Giờ hoàng đạo:</div>';
              html += '<div style=\'margin-bottom:10px; font-size:0.85em; color:white;\'>' + det.gio_hoang_dao + '</div>';
              html += '<div style=\'color:orange; font-weight:bold; margin-bottom:5px;\'>🔮 Giờ hắc đạo:</div>';
              html += '<div style=\'color:#ff6b6b; font-size:0.85em;\'>' + det.gio_hac_dao + '</div></div>';
              
              html += '<hr style=\'border:0; border-top:1px dashed rgba(255,255,255,0.2); margin:12px 0;\'>';
              html += '<div><div style=\'color:orange; font-weight:bold; margin-bottom:5px;\'>🧭 Hướng xuất hành:</div>';
              html += '<div style=\'color:white;\'>Hỷ Thần: <span style=\'color:#51cf66;\'>' + det.huong_xuat_hanh['Hỷ Thần'] + '</span> - Tài Thần: <span style=\'color:#51cf66;\'>' + det.huong_xuat_hanh['Tài Thần'] + '</span></div>';
              html += '<div style=\'color:white; margin-top:3px;\'>Tránh: <span style=\'color:#ff6b6b;\'>' + det.huong_xuat_hanh['Hạc Thần'] + '</span></div></div>';
              
              html += '<hr style=\'border:0; border-top:1px dashed rgba(255,255,255,0.2); margin:12px 0;\'>';
              html += '<div><div style=\'color:orange; font-weight:bold; margin-bottom:8px;\'>🔥 Trực: <span style=\'background:#2b8a3e; color:white; padding:2px 6px; border-radius:4px; font-size:0.8em; font-weight:normal;\'>' + det.thap_nhi_truc.name + '</span></div>';
              html += '<div style=\'color:white;\'>✅ <strong>Tốt:</strong> ' + det.thap_nhi_truc.details.tot + '</div>';
              html += '<div style=\'margin-top:5px; color:white;\'>❌ <strong>Xấu:</strong> <span style=\'color:#ff6b6b;\'>' + det.thap_nhi_truc.details.xau + '</span></div></div>';
              
              html += '<hr style=\'border:0; border-top:1px dashed rgba(255,255,255,0.2); margin:12px 0;\'>';
              html += '<div><div style=\'color:orange; font-weight:bold; margin-bottom:5px;\'>🌟 Ngũ hành: <span style=\'font-weight:normal; font-size:0.9em; color:white;\'>' + det.ngay_mo_ta + '</span></div>';
              det.ngay_chi_tiet.forEach(function(detail) { html += '<div style=\'margin-top:4px; color:white;\'>' + detail + '</div>'; });
              html += '</div>';
              
              html += '<hr style=\'border:0; border-top:1px dashed rgba(255,255,255,0.2); margin:12px 0;\'>';
              html += '<div><div style=\'color:orange; font-weight:bold; margin-bottom:5px;\'>💫 Nhị Thập Bát Tú: <span style=\'background:#2b8a3e; color:white; padding:2px 6px; border-radius:4px; font-size:0.8em; font-weight:normal;\'>' + det.nhi_thap_bat_tu.name + '</span></div>';
              html += '<div style=\'font-style:italic; color:#FFD700; font-size:0.85em; margin-bottom:4px;\'>(' + det.nhi_thap_bat_tu.details.tenNgay + ')</div>';
              html += '<div style=\'font-style:italic; margin-bottom:8px; color:white;\'>' + det.nhi_thap_bat_tu.details.danhGia + '</div>';
              html += '<div style=\'color:white;\'>👍 <strong>Nên làm:</strong> ' + det.nhi_thap_bat_tu.details.nenLam + '</div>';
              html += '<div style=\'margin-top:5px; color:white;\'>👎 <strong>Kiêng cữ:</strong> <span style=\'color:#ff6b6b;\'>' + det.nhi_thap_bat_tu.details.kiengCu + '</span></div></div>';
              
              html += '</div></details>';
            }

            resDiv.innerHTML = html; 
          } 
          resDiv.style.display = 'block'; 
        } catch(e) { 
          console.error(e); 
          resDiv.style.display = 'block'; 
          resDiv.innerHTML = '<span style=\'color:#ff6b6b;\'>❌ Lỗi kết nối hệ thống. Hãy kiểm tra lại.</span>'; 
        } finally { 
          btn.innerText = 'TÍNH TOÁN QUY ĐỔI'; 
          btn.style.opacity = '1'; 
        } 
      })(this)">TÍNH TOÁN QUY ĐỔI</button>

      <div class="conv-result" style="display: none; margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.5); border-radius: 8px; border-left: 4px solid orange; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); color: white;"></div>
    </div>
  </div>
card_mod:
  style: >
    ha-card {
      background: rgba(0,0,0,0.3) !important;
    }

    .scroll-area {
      max-height: 250px; 
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 5px;
    }

    .scroll-area::-webkit-scrollbar { width: 4px; }
    .scroll-area::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
    .scroll-area::-webkit-scrollbar-thumb { background: rgba(255, 165, 0, 0.6);
    border-radius: 4px; }

    .flip-emoji {
      display: inline-block;
      animation: flip-hourglass 6s ease-in-out infinite;
    }

    @keyframes flip-hourglass {
      0% { transform: rotate(0deg); }
      12.5% { transform: rotate(180deg); }
      50% { transform: rotate(180deg); }
      62.5% { transform: rotate(0deg); }
      100% { transform: rotate(0deg); }
    }

    tr.event-row {
      cursor: pointer;
      transition: background-color 0.2s;
    }

    tr.event-row:hover {
      background-color: rgba(255, 255, 255, 0.05);
    }

    .detail-content {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 8px;
      margin-top: 5px;
      padding: 12px 15px;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.05);
      animation: expandIn 0.3s ease-out;
    }

    @keyframes expandIn {
      0% { opacity: 0; transform: translateY(-5px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .attr-row {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px dashed rgba(255,255,255,0.15);
      padding: 6px 0;
    } .attr-row:last-child { border-bottom: none; }

    .attr-box {
      background: rgba(255,255,255,0.05);
      padding: 10px 12px;
      border-radius: 6px;
      margin-top: 8px;
      border-left: 3px solid orange;
    } .attr-label { color: #aaa; font-size: 0.9em; } .attr-value { color: white;
    font-weight: 500; text-align: right; } .attr-value-full { color: white;
    font-weight: normal; font-style: italic; margin-top: 4px; line-height: 1.4;
    font-size: 0.95em; }

    .conv-header {
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      cursor: pointer; 
      padding: 5px 20px 5px 5px; 
      border-radius: 6px; 
      transition: background 0.2s;
    } .conv-header:hover { background: rgba(255,255,255,0.05); }

    .conv-body {
      max-height: 350px;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 5px;
    } .conv-body::-webkit-scrollbar { width: 4px; }
    .conv-body::-webkit-scrollbar-track { background: rgba(0,0,0,0.1);
    border-radius: 4px; } .conv-body::-webkit-scrollbar-thumb { background:
    rgba(255, 165, 0, 0.6); border-radius: 4px; }

    .conv-input {
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px; border-radius: 6px; outline: none; text-align: center; font-size: 1em;
    } .conv-input:focus { border-color: orange; } .conv-btn {
      width: 100%; background: rgba(255, 165, 0, 0.8); color: black; font-weight: bold; border-radius: 6px; padding: 10px; border: none; cursor: pointer; transition: background 0.2s; font-size: 1em;
    } .conv-btn:hover { background: rgba(255, 165, 0, 1); }

    /* CSS CHO NÚT CHI TIẾT LỊCH ÂM XỔ XUỐNG */ .btn-detail {
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      padding: 6px 12px;
      border-radius: 6px;
      color: #4dabf7;
      font-weight: bold;
      user-select: none;
      display: inline-block;
      transition: background 0.2s;
    } .btn-detail:hover { background: rgba(255,255,255,0.2); }
    .btn-detail::marker { content: '▶ '; color: orange; font-size: 0.9em; }
    details[open] > .btn-detail::marker { content: '▼ '; color: orange;
    font-size: 0.9em; }
